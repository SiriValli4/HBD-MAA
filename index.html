<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday supercalifragilisticexpialidocious MAA ! 🎉</title>
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            overflow-x: hidden;
        }
        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        p {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: #fff;
            margin-bottom: 30px;
            line-height: 1.4;
        }
        .btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            touch-action: manipulation;
        }
        .btn:hover, .btn:active {
            background: #ff5252;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1000;
        }
        @media (max-width: 480px) {
            body { padding: 10px; }
        }
    </style>
</head>
<body>
    <h1>Happy Birthday supercalifragilisticexpialidocious MAA! 🎂</h1>
    <p>May your day be filled with joy, laughter, and all your favorite things. Here's to another amazing year ahead!</p>
    <p>Click below for confetti celebration! ✨</p>
    <button class="btn" onclick="launchConfetti()">Launch Confetti 🎉</button>

    <script>
        const jsConfetti = new JSConfetti();

        function launchConfetti() {
            jsConfetti.addConfetti({
                emojis: ['🎉', '🎂', '🎈', '✨', '🎁', '🌟'],
                confettiNumber: 100,
                confettiRadius: 6
            });
        }

        // Auto-launch on load for extra fun
        window.addEventListener('load', launchConfetti);
    </script>
</body>
</html>
